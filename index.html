<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
  <title>Blog preview card</title>
</head>



<body class="bg-yellow-400">
  <main class="bg-yellow-400 md:bg-yellow-400">
    <div
      class="main-container h-screen bg-white text-sm md:text-base lg:text-lg xl:text-xl lg:flex lg:flex-col lg:justify-center lg:items-center p-5 text-md flex flex-col justify-center items-center">
      <img src="./assets/images/illustration-article.svg" class="h-60 w-30 rounded-sm lg:h-60" alt="illustration image">



      <div class="second-container mt-4">
        <p class="text-gray-950 px-4 py-2 bg-yellow-300 inline-block font-bold">Learning</p>

        <p class="text-gray-700 text-md mt-4 font-bold"> Published 21 Dec 2023
        </p>

        <h3 class="text-gray-950 text-xl font-bold mb-4 mt-4">HTML & CSS foundations</h3>


        <p class="text-gray-500 flex-wrap letter lg:"> These languages are the backbone of every website, defining
          structure,
          content, and presentation.
        </p>
        <div class="flex flex-row mt-5 items-center gap-2">
          <img src="./assets/images/image-avatar.webp" class="h-10 w-17" alt="Image of an Avatar">
          <p class="text-gray-950 font-bold text-lg ">Greg Hooper</p>
        </div>
      </div>
    </div>

  </main>

</html>
