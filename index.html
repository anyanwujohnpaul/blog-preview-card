    <meta charset="UTF-8" />

    <!-- Tailwind CSS Play CDN -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Blog preview card</title>

  <body class="bg-amber-200">
    <main>
      <div

        />

            Learning

            Published 21 Dec 2023
          </p>

          <h2
            class="text-black hover:text-yellow-600 font-bold text-md justify-content mb-3"
          >
            HTML & CSS foundations
          </h2>

          <!-- p:  -->
          <p class="text-xs tracking-tight">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>

          <div class="flex flex-row gap-2 items-center mt-4 text-left">
            <img
              class="size-8 rounded-md"
              src="assets/images/image-avatar.webp"
              alt=""
            />

            <p class="text-md font-figtree font-bold text-black">Greg Hooper</p>
          </div>
        </div>
      </div>
    </main>
