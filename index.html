<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
  <title>Blog preview card</title>
</head>

<!-- hsl(47, 88%, 63%) -->
<body class="bg-[hsl(47, 88%, 63%)]">
  <main>
    <section class="h-screen bg-white-500 p-5 text-md text-bolder flex flex-col justify-center items-center">
      <div class="first-container">
        <img src="./assets/images/illustration-article.svg" class="size h-40 w-40 rounded" alt="illustration image">
      </div>

      <div class="second-container">
        <p class="text-gray-950 m-5 px-2 py-2 bg-[hsl(47, 88%, 63%)] inline-block font-normal">Learning</p>

        <p class="text-gray-500"> Published 21 Dec 2023
        </p>

        <h3 class="text-gray-950 font-bolder"> HTML & CSS foundations</h3>


        <p class="text-gray-500 flex-wrap"> These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>

        <div class="flex flex-row mt-5 gap-2">
          <img src="./assets/images/image-avatar.webp" class="h-30 w-30" alt="Image of an Avatar">
          <p class="text-gray-950 font-bold">Greg Hooper</p>
        </div>
      </div>
    </section>
  </main>

  </div> -->
</body>

</html>
